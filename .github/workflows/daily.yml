name: Daily update

on:
  schedule:
    # Multiple daily runs so the CLV log captures a price close to each kickoff
    # (the "closing line") and settles finished games promptly. WC 2026 is in
    # North America, so kickoffs cluster roughly 16:00–03:00 UTC. Repeat runs are
    # cheap on the API quota: the historical prior + player pools stay cached in
    # cache.json, so only odds/fixtures/results are re-fetched each time.
    - cron: "0 12 * * *"     # morning board refresh
    - cron: "0 16 * * *"     # afternoon (US noon-ish) kickoffs
    - cron: "0 18 * * *"
    - cron: "0 20 * * *"
    - cron: "0 22 * * *"
    - cron: "0 0 * * *"      # late US evening kickoffs
    - cron: "0 2 * * *"      # settle the last games of the night
  workflow_dispatch:          # manual run button (use ~1h before a game you care about)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # scipy: model math. soccerdata: optional xG source (Phase 2.1) — the pipeline
      # degrades gracefully to goals if it fails to install or scrape, so it must not
      # break the run. Pinned-free install; remove soccerdata if you don't want xG.
      - run: pip install scipy && pip install soccerdata || echo "soccerdata unavailable — xG will fall back to goals"
      - name: Run agent + model
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WC_LEAGUE_ID: "1"
          WC_SEASON: "2026"
        run: python update.py
      - name: Commit data
        run: |
          git config user.name  "wc-edge-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json cache.json clv_log.json
          git commit -m "daily update $(date -u +%F)" || echo "no changes"
          git push
