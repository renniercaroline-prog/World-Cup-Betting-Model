name: Daily update

on:
  schedule:
    - cron: "0 12 * * *"     # 12:00 UTC daily
  workflow_dispatch:          # manual run button in the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # scipy: model math. soccerdata: optional xG source (Phase 2.1) — the pipeline
      # degrades gracefully to goals if it fails to install or scrape, so it must not
      # break the run. Pinned-free install; remove soccerdata if you don't want xG.
      - run: pip install scipy && pip install soccerdata || echo "soccerdata unavailable — xG will fall back to goals"
      - name: Run agent + model
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WC_LEAGUE_ID: "1"
          WC_SEASON: "2026"
        run: python update.py
      - name: Commit data
        run: |
          git config user.name  "wc-edge-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json cache.json
          git commit -m "daily update $(date -u +%F)" || echo "no changes"
          git push
