name: Daily update

on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC every day (before evening kickoffs)
  workflow_dispatch:         # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install scipy

      - name: Run model
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          WC_LEAGUE_ID: "1"     # confirm the World Cup league id via /leagues
          WC_SEASON: "2026"
        run: python update.py

      - name: Commit data.json
        run: |
          git config user.name  "wc-edge-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json stats_cache.json
          git commit -m "daily update $(date -u +%F)" || echo "no changes"
          git push
